version: "3.9"

services:
  dct-compressor:
    build: .
    image: dct-image-compressor:latest
    container_name: dct-compressor
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
